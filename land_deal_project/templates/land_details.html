<!DOCTYPE html>
<html>
<head>
<title>Land Details</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f6f7fb;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.predict-btn{
background:#16a34a;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
}

.predict-btn:hover{
background:#15803d;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.land-img{
width:50%;
height:350px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

#map{
height:350px;
margin-top:15px;
border-radius:10px;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:20px;
}

.predict-panel{
display:none;
margin-top:15px;
padding:15px;
background:#f0fdf4;
border-radius:10px;
}

input,select{
padding:6px;
margin-top:4px;
margin-bottom:10px;
width:200px;
}
</style>

</head>

<body>

<div class="container">

<div class="top-bar">
<div>
<h2>{{ land.title }}</h2>
<p>{{ land.location }}</p>
<p class="price">₹ {{ land.price }}</p>
</div>

<button class="predict-btn" onclick="togglePredict()">
Predict Price
</button>
</div>

<div class="card">
<img src="{{ url_for('static', filename=land.image) }}" class="land-img">

<div id="map"></div>
</div>

<!-- Hidden ML Panel -->
<div class="predict-panel" id="predictBox">

<form method="POST" action="/predict_price">

<label>Area</label><br>
<input type="number" name="area" required><br>

<label>Road Access</label><br>
<select name="road">
<option value="1">Yes</option>
<option value="0">No</option>
</select><br>

<label>Distance from City</label><br>
<input type="number" name="distance" step="0.1" required><br>

<button class="predict-btn" type="submit">Predict</button>

</form>

{% if predicted_price %}
<h4>Estimated Price: ₹ {{ predicted_price }}</h4>
{% endif %}

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function togglePredict(){
var box = document.getElementById("predictBox");
box.style.display = box.style.display === "block" ? "none" : "block";
}

var lat = Number("{{ land.lat }}");
var lng = Number("{{ land.lng }}");

var map = L.map('map').setView([lat, lng], 17);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom: 19
}
).addTo(map);

L.marker([lat, lng]).addTo(map);

L.circle([lat, lng], {
color: 'green',
fillColor: '#0f0',
fillOpacity: 0.3,
radius: 120
}).addTo(map);

</script>

</body>
</html>
